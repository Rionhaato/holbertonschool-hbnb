<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HBnB | Places</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="site-shell">
        <header class="site-header">
            <div class="brand">
                <a href="index.html" aria-label="HBnB home">
                    <img src="images/logo.png" alt="HBnB logo" class="logo">
                </a>
                <div>
                    <p class="eyebrow">Simple Web Client</p>
                    <h1>Find your next stay</h1>
                </div>
            </div>
            <a href="login.html" class="login-button auth-link">Login</a>
        </header>

        <nav class="site-nav" aria-label="Primary">
            <a href="index.html" aria-current="page">Places</a>
            <a href="place.html" class="place-nav-link">Place Details</a>
            <a href="add_review.html" class="review-nav-link">Add Review</a>
            <a href="login.html" class="auth-link">Login</a>
        </nav>

        <main>
            <section class="hero">
                <div>
                    <p class="eyebrow">Curated homes</p>
                    <h2>Comfortable spaces for city breaks, remote work, and longer stays.</h2>
                </div>
                <form class="filter-bar" action="#" method="get">
                    <label for="price-filter">Maximum Price</label>
                    <select id="price-filter" name="price">
                        <option value="10">10</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                        <option value="all" selected>All</option>
                    </select>
                </form>
            </section>

            <section aria-labelledby="places-heading">
                <div class="section-heading">
                    <h2 id="places-heading">Available Places</h2>
                    <p>Browse the full list from the API and narrow the results by price.</p>
                </div>

                <p id="places-status" class="form-message status-message">Loading places...</p>
                <div id="places-list" class="places-grid"></div>
            </section>
        </main>

        <footer class="site-footer">
            <p>All rights reserved.</p>
        </footer>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
