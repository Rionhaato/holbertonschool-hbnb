<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HBnB | Login</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="site-shell">
        <header class="site-header">
            <div class="brand">
                <a href="index.html" aria-label="HBnB home">
                    <img src="images/logo.png" alt="HBnB logo" class="logo">
                </a>
                <div>
                    <p class="eyebrow">Simple Web Client</p>
                    <h1>Account access</h1>
                </div>
            </div>
            <div class="account-controls">
                <a href="login.html" class="login-button auth-link" aria-current="page">Login</a>
                <div class="user-chip is-hidden" id="user-chip">
                    <div class="user-avatar" id="user-avatar" aria-hidden="true">?</div>
                    <div class="user-meta">
                        <p class="user-label">Signed in as</p>
                        <p class="user-email" id="user-email">Guest</p>
                    </div>
                    <button type="button" class="logout-button" id="logout-button">Logout</button>
                </div>
            </div>
        </header>

        <nav class="site-nav" aria-label="Primary">
            <a href="index.html">Places</a>
            <a href="place.html" class="place-nav-link">Place Details</a>
            <a href="add_review.html" class="review-nav-link">Add Review</a>
            <a href="login.html" aria-current="page">Login</a>
        </nav>

        <main class="centered-main">
            <section class="auth-panel" aria-labelledby="login-heading">
                <p class="eyebrow">Welcome back</p>
                <h2 id="login-heading">Login to continue</h2>
                <p>Use your HBnB account to access place details and leave a review.</p>

                <p id="login-error" class="form-message error-message" hidden></p>

                <form id="login-form" class="form" action="#" method="post" novalidate>
                    <div class="form-row">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-row">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="primary-button">Login</button>
                </form>
            </section>
        </main>

        <footer class="site-footer">
            <p>All rights reserved.</p>
        </footer>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
